services:
  - type: worker
    name: sanya-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: /data/bot.sqlite3
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1